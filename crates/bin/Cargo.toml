[package]
name = "externalip-manager"
version = "0.5.1"
edition = "2024"
description = "Manage ExternalIP assignments on Kubernetes Services"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive", "env", "string"] }
tokio = { version = "1.52.1", features = ["full"] }
k8s-openapi = { version = "0.27.1", features = ["schemars", "v1_31"] }
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json"] }
tracing = "0.1.44"
externalip-manager-manager = { path = "../manager" }
